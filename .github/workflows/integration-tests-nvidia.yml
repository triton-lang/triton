name: Integration Tests CUDA

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string

jobs:
  integration-tests-nvidia:
    name: integration-tests-nvidia (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.runs_on }}
    timeout-minutes: 60
    # Let A100 and H100 continue even if GB200 fails, as it's a bit flaky
    continue-on-error: ${{ startsWith(matrix.config.runner_type, 'nvidia-gb200') }}
    strategy:
      matrix:
        config: ${{ fromJson(inputs.matrix) }}
    env:
      RUNNER_TYPE: ${{ matrix.config.runner_type }}
      TRITON_BUILD_WITH_CCACHE: "true"
      TRITON_BUILD_WITH_CLANG_LLD: "TRUE"
      TRITON_USE_ASSERT_ENABLED_LLVM: "TRUE"
      TRITON_DISABLE_LINE_INFO: 1
      PROTON_SKIP_PC_SAMPLING_TEST: 1
      PYTHON: "python3"
      CCACHE_COMPRESS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Compute cache keys
        id: cache-key
        run: |
          llvm_file="cmake/llvm-info.json"
          nvidia_file="cmake/nvidia-toolchain-version.json"
          json_file="cmake/json-version.txt"

          # Check if files exist before proceeding
          if [[ ! -f "$llvm_file" || ! -f "$nvidia_file" || ! -f "$json_file" ]]; then
            echo "Error: Required dependency files are missing."
            exit 1
          fi

          # Process the files if they exist
          echo "llvm=$(sha256sum $llvm_file | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
          echo "nvidia=$(sha256sum $nvidia_file | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
          echo "json=$(cat $json_file)" >> $GITHUB_OUTPUT
        shell: bash
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          # Note that we cannot use environment variables here given there is
          # no shell to interpret them in the paths.
          path: |
            ~/.triton/llvm
            ~/.triton/nvidia
            ~/.triton/json
          key: ${{ runner.os }}-${{ runner.arch }}-llvm-${{ steps.cache-key.outputs.llvm }}-nvidia-${{ steps.cache-key.outputs.nvidia }}-json-${{ steps.cache-key.outputs.json }}
      - name: Inspect cache directories
        run: |
          mkdir -p ~/.triton
          du -h -d 1 ~/.triton

          mkdir -p ~/.ccache
          du -h -d 1 ~/.ccache
      - name: Update PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup Python environment for NVIDIA self-hosted runners
        run: |
          echo "/venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=/venv" >> $GITHUB_ENV
          echo "PYTHONHOME=" >> $GITHUB_ENV
      - name: Install Triton
        env:
          CUDA_HOME: "/usr/local/cuda"
        run: |
          nproc
          nvidia-smi
          echo "PATH is '$PATH'"
          ccache --zero-stats
          make dev-install
      - name: CCache Stats
        run: ccache --print-stats
      - name: Run lit tests
        run: make test-lit
      - name: Run triton tests
        run: |
          if [[ "${{ matrix.config.runner_type }}" != "nvidia-gb200" ]]; then
            exec make NUM_PROCS=24 test-unit
          fi
          set -euo pipefail
          test "$(nvidia-smi -L | wc -l)" -ge 4
          pids=()
          CUDA_VISIBLE_DEVICES=0 python3 -m pytest -s --tb=short -n 24 \
            --ignore-glob='plugins/*' python/test/unit & pids+=("$!")
          for group in 1 2 3 4; do
            gpu=$((group - 1))
            CUDA_VISIBLE_DEVICES="$gpu" python3 -m pytest -s --tb=short -n 3 \
              --splits 4 --group "$group" --splitting-algorithm=least_duration \
              python/triton_kernels/tests/ & pids+=("$!")
          done
          CUDA_VISIBLE_DEVICES=0 python3 -m pytest -s --tb=short \
            python/tutorials/06-fused-attention.py & pids+=("$!")
          CUDA_VISIBLE_DEVICES=0 \
            TRITON_ALWAYS_COMPILE=1 \
            TRITON_DISABLE_LINE_INFO=0 \
            LLVM_PASS_PLUGIN_PATH=python/triton/instrumentation/libGPUInstrumentationTestLib.so \
            python3 -m pytest -s --tb=short --capture=tee-sys -rfs -vvv \
              python/test/unit/instrumentation/test_gpuhello.py & pids+=("$!")
          status=0
          for pid in "${pids[@]}"; do
            wait "$pid" || status=1
          done
          exit "$status"
      - name: Run gluon tests
        run: |
          if [[ "${{ matrix.config.runner_type }}" != "nvidia-gb200" ]]; then
            exec make NUM_PROCS=24 test-gluon
          fi
          set -euo pipefail
          test "$(nvidia-smi -L | wc -l)" -ge 4
          pids=()
          for group in 1 2 3; do
            gpu=$((group - 1))
            CUDA_VISIBLE_DEVICES="$gpu" python3 -m pytest -s --tb=short -n 8 \
              --splits 3 --group "$group" --splitting-algorithm=least_duration \
              --ignore=python/test/gluon/test_fpsan.py \
              python/test/gluon/ python/tutorials/gluon/ & pids+=("$!")
          done
          CUDA_VISIBLE_DEVICES=2 python3 -m pytest -s --tb=short -n 12 --maxschedchunk=1 \
            python/test/gluon/test_fpsan.py & pids+=("$!")
          CUDA_VISIBLE_DEVICES=3 \
            PYTHONPATH="$PWD/python/triton_kernels${PYTHONPATH:+:$PYTHONPATH}" \
            python3 -m pytest -s --tb=short -n 2 python/examples/gluon/ & pids+=("$!")
          status=0
          for pid in "${pids[@]}"; do
            wait "$pid" || status=1
          done
          exit "$status"
      - name: Run gsan tests
        run: make NUM_PROCS=24 test-gsan
      - name: Run interpreter tests
        if: ${{ matrix.config.runner_type == 'nvidia-h100' }}
        run: make test-interpret
      - name: Run regression tests
        run: make test-regression
      - name: Run microbenchmark tests
        # Microbenchmark never fail but running them gives us an easy way to track performance changes.
        run: make test-microbenchmark
      - name: Run C++ unittests
        run: make test-cpp
      - name: Run Proton tests
        run: make test-proton
      - name: Inspect cache directories
        run: |
          mkdir -p ~/.triton
          du -h -d 1 ~/.triton

          mkdir -p ~/.ccache
          du -h -d 1 ~/.ccache
